<!DOCTYPE html>
<html>
<head>
    <title>Patient Registration Form</title>
    <link rel= "stylesheet" href="patient-registration.css">
</head>
<body>
<div class="container">
<h1>Patient Registration Form</h1>
<p>Thank you for applying to our practices. Please complete this patient<br>registration form with your information, and a doctor will contact you shortly.</p>
<hr>
<form action="/action_page.php" >
<div>
    <label>Patient's Name</label>
    <input type="text" placeholder="First">
    <input type="text" placeholder="Last">
</div>
<div>
    <label>Gender</label>
    <input type="radio" id="male" name="gender" value="male">
    <label for="male">Male</label>
    <input type="radio" id="female" name="gender" value="female">
    <label for="female">Female</label>
</div>
<div>
    <label>Phone</label>
    <input type="tel" id="phone" placeholder="### ### ####">
</div>
<div>
    <label>Date of Birth</label>
    <input type="date" id="dob">
</div>
<div>
    <label>Marital Status</label>
    <input type="radio" id="single" name="maritalstatus" value="single">
    <label for="single">Single</label>
    <input type="radio" id="married" name="maritalstatus" value="married">
    <label for="married">Married</label>
    <input type="radio" id="divorced" name="maritalstatus" value="divorced">
    <label for="divorced">Divorced</label>
    <input type="radio" id="widow" name="maritalstatus" value="widow">
    <label for="widow">Widow</label>
</div>
<div>
    <label>Patient's Address</label>
    <input type="text" placeholder="Street Address"><br>
    <input type="text" placeholder="City">
    <input type="text" placeholder="State"><br>
    <input type="text" placeholder="Postal/Zip Code">
    <input list="countries" placeholder="Country">
  <datalist id="countries">
    <option value="United States">
    <option value="Russia">
    <option value="China">
    <option value="India">
    <option value="Japan">
  </datalist>
<div> 
  <label>Insurance Name</label>
  <input type="text">
</div>
<div>
    <label>Past medical history</label>
    <input type="checkbox" id="disease1" value="Anemia">
    <label for="disease1">Anemia</label><br>
    <input type="checkbox" id="disease2" value="Asthama">
    <label for="disease2">Asthama</label><br>
    <input type="checkbox" id="disease3" value="Bronchitis">
    <label for="disease3">Bronchitis</label><br>
    <input type="checkbox" id="disease4" value="Chickenpox">
    <label for="disease4">Chickenpox</label><br>
    <input type="checkbox" id="disease5" value="Diabetes">
    <label for="disease5">Diabetes</label><br>
    <input type="checkbox" id="disease6" value="Pneumonia">
    <label for="disease6">Pneumonia</label><br>
    <input type="checkbox" id="disease7" value="Thyroid">
    <label for="disease7">Thyroid</label><br>
    <input type="checkbox" id="disease8" value="Ulcer">
    <label for="disease8">Ulcer</label><br>
    <input type="checkbox" id="disease9" value="Other">
    <label for="disease9">Other</label>
</div>
<div>
    <label for="signature">Patient/Gaurdian Signature</label><br>
    <label>According to our privacy policy and federal law, your information within this patient registration form will remain private at all time.
    </label><br>
    <input type="text" id="signature" name="signature">
</div>
<div>
    <label>Verification</label>
    <input type="checkbox" id="human" required>
    <label for="human">I am not a robot</label>
</div>
<div>
    <input type="submit" value="Register">
</div>
</form>
</div>
</body>
</html>
